name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: ./.github/actions/setup
        with:
          node-version: '22'

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org

      - name: Fetch main and dev branches
        run: |
          git fetch origin main --depth=1
          git fetch origin dev --depth=1

      - name: Validate tag and compute publish metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG_COMMIT=$(git rev-parse "${GITHUB_REF}^{}")
          MAIN_HEAD=$(git rev-parse origin/main)
          DEV_HEAD=$(git rev-parse origin/dev)

          if [[ "$VERSION" == *"-dev."* ]]; then
            NPM_TAG="dev"
            EXPECTED="dev"
            SYNC_BRANCH="dev"
          elif [[ "$VERSION" == *"-alpha."* ]]; then
            NPM_TAG="alpha"
            EXPECTED="any"
            SYNC_BRANCH=""
          elif [[ "$VERSION" == *"-beta."* ]]; then
            NPM_TAG="beta"
            EXPECTED="any"
            SYNC_BRANCH=""
          elif [[ "$VERSION" == *"-rc."* ]]; then
            NPM_TAG="rc"
            EXPECTED="any"
            SYNC_BRANCH=""
          elif [[ "$VERSION" == *"-"* ]]; then
            NPM_TAG="next"
            EXPECTED="any"
            SYNC_BRANCH=""
          else
            NPM_TAG="latest"
            EXPECTED="main"
            SYNC_BRANCH="main"
          fi

          case "$EXPECTED" in
            main)
              if [ "$TAG_COMMIT" != "$MAIN_HEAD" ]; then
                echo "Stable release tag must point to main HEAD. Refusing to publish."
                echo "  tag commit : $TAG_COMMIT"
                echo "  main HEAD  : $MAIN_HEAD"
                exit 1
              fi
              ;;
            dev)
              if [ "$TAG_COMMIT" != "$DEV_HEAD" ]; then
                echo "-dev.N prerelease tag must point to dev HEAD. Refusing to publish."
                echo "  tag commit : $TAG_COMMIT"
                echo "  dev HEAD   : $DEV_HEAD"
                exit 1
              fi
              ;;
            any)
              if [ "$TAG_COMMIT" != "$MAIN_HEAD" ] && [ "$TAG_COMMIT" != "$DEV_HEAD" ]; then
                echo "Prerelease tag must point to main or dev HEAD. Refusing to publish."
                echo "  tag commit : $TAG_COMMIT"
                echo "  main HEAD  : $MAIN_HEAD"
                echo "  dev HEAD   : $DEV_HEAD"
                exit 1
              fi
              ;;
          esac

          echo "version=$VERSION"          >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG"          >> "$GITHUB_OUTPUT"
          echo "sync_branch=$SYNC_BRANCH"  >> "$GITHUB_OUTPUT"

      - name: Sync package version with tag
        run: npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public --tag "${{ steps.meta.outputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Checkout sync branch for version bump
        if: steps.meta.outputs.sync_branch != ''
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.sync_branch }}
          fetch-depth: 0

      - name: Sync version on ${{ steps.meta.outputs.sync_branch }} branch
        if: steps.meta.outputs.sync_branch != ''
        run: npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version

      - name: Commit and push version bump
        if: steps.meta.outputs.sync_branch != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi
          git commit -m "chore: sync version with tag ${{ github.ref_name }}"
          git push origin HEAD:${{ steps.meta.outputs.sync_branch }}
